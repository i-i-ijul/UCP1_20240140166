<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Formulir</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <form>
        <fieldset>
            <legend>Formulir Calon Pegawai</legend>
            <p>Nama: <input type="text" name="nama"></p>
            <p>Alamat: <input type="text" name="alamat"></p>
            <p>Password: <input type="password" name="pass"></p>
            
            <p>Jenis Kelamin:
                <input type="radio" name="jk" value="laki-laki" checked> Laki-Laki
                <input type="radio" name="jk" value="perempuan"> Perempuan
            </p>

            <p>Bahasa pemrograman yang dikuasai:<br>
                <input type="checkbox" name="web"> Web
                <input type="checkbox" name="mobile"> Mobile
                <input type="checkbox" name="desk"> Desktop
            </p>

            <p>Bidang:
                <select name="kota">
                    <option value="Backend Developer">Backend Developer</option>
                    <option value="Frontend Developer">Frontend Developer</option>
                </select>
            </p>

            <p>Apa yang Membuat Kami harus memilih Anda?:<br>
                <textarea rows="10" cols="30" placeholder="Tulis jawaban Anda di sini"></textarea>
            </p>
            
            <p><input type="submit" value="Submit"></p>
            <script src="ucp.js"></script>
        </fieldset>
    </form>
    <button class="back"><a href="index.html">Home</a></button>
</body>
</html>
